name: Deploy App to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    pages: write
    id-token: write
    contents: read

concurrency:
    group: 'pages'
    cancel-in-progress: false

jobs:
    build-and-deploy:
        environment:
            name: github-pages
        runs-on: ubuntu-latest
        steps:
            - name: Checkout source
              uses: actions/checkout@v6
            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
            - name: Install dependencies
              run: npm ci
            - name: Check format
              run: npm run format:check
            - name: Build app
              run: npm run build -- --base=/${{ github.event.repository.name }}/
              env:
                  VITE_KEYCLOAK_URL: ${{ vars.PROD_KEYCLOAK_URL }}
                  VITE_KEYCLOAK_REALM: ${{ vars.PROD_KEYCLOAK_REALM }}
                  VITE_KEYCLOAK_CLIENT_ID: ${{ vars.PROD_KEYCLOAK_CLIENT_ID }}
                  VITE_BACKEND_URL: ${{ vars.PROD_BACKEND_URL }}
            - name: Upload artifacts
              uses: actions/upload-pages-artifact@v3
              with:
                  name: 'app-prod'
                  path: 'dist'
            - name: Deploy to GitHub Pages
              uses: actions/deploy-pages@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  artifact_name: 'app-prod'
